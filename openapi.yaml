openapi: 3.1.0
info:
  title: Smart Campus — AI Vision Service
  version: 1.0.0
  description: |
    Hợp đồng API giữa Core Business (Consumer)
    và AI Vision (Provider) — Cặp 02.

    AI Vision cung cấp khả năng phân tích ảnh, nhận diện khuôn mặt
    và trả kết quả detect cho Core Business để ra quyết định nghiệp vụ.
  contact:
    name: FIT4110 Teaching Team
    email: fit4110@example.edu.vn

servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: https://api.campus.local
    description: Class network placeholder

tags:
  - name: health
    description: Kiểm tra trạng thái service
  - name: vision
    description: Phân tích ảnh và face match

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái AI Vision service
      description: Endpoint kiểm tra service còn hoạt động. Không yêu cầu xác thực.
      tags: [health]
      security: []
      responses:
        "200":
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                ok:
                  value:
                    status: ok
                    service: ai-vision
                    time: "2026-05-10T08:00:00Z"

  /vision/face-match:
    post:
      operationId: faceMatch
      summary: So khớp khuôn mặt
      description: |
        Core Business gửi yêu cầu so khớp khuôn mặt.
        Request có thể là URL ảnh (ImageRefRequest) hoặc vector embedding (EmbeddingRequest).
        AI Vision trả kết quả match gồm confidence, decision và modelVersion.
      tags: [vision]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaceMatchRequest"
            examples:
              imageRef:
                summary: Gửi URL ảnh
                value:
                  requestType: IMAGE_REF
                  traceId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                  imageRef: https://storage.campus.local/frames/frame-001.jpg
              embedding:
                summary: Gửi vector embedding
                value:
                  requestType: EMBEDDING
                  traceId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babd
                  embedding: [0.12, 0.45, 0.78]
      responses:
        "200":
          description: Kết quả so khớp khuôn mặt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaceMatchResult"
              examples:
                matched:
                  value:
                    matchId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    traceId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    decision: MATCH
                    confidence: 0.97
                    subjectId: STUDENT-2026-001
                    reason: null
                    modelVersion: v2.1.0
                    processedAt: "2026-05-10T08:00:00Z"
                lowConfidence:
                  value:
                    matchId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babe
                    traceId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babe
                    decision: LOW_CONFIDENCE
                    confidence: 0.45
                    subjectId: null
                    reason: Chất lượng ảnh thấp, không đủ độ sáng
                    modelVersion: v2.1.0
                    processedAt: "2026-05-10T08:01:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /vision/detections/{detectionId}:
    get:
      operationId: getDetectionById
      summary: Lấy kết quả detection theo ID
      description: |
        Core Business lấy chi tiết một kết quả detection theo detectionId.
        Dùng để audit hoặc lấy kết quả sau khi Camera gửi frame lên AI Vision.
      tags: [vision]
      parameters:
        - $ref: "#/components/parameters/DetectionId"
      responses:
        "200":
          description: Chi tiết kết quả detection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Detection"
              examples:
                found:
                  value:
                    detectionId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    sourceDeviceId: CAMERA-01
                    objects:
                      - label: person
                        confidence: 0.95
                        boundingBox:
                          x: 10
                          y: 20
                          width: 100
                          height: 200
                    overallConfidence: 0.95
                    riskLevel: LOW
                    modelVersion: v2.1.0
                    detectedAt: "2026-05-10T08:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /vision/results/recent:
    get:
      operationId: getRecentResults
      summary: Lấy danh sách kết quả gần đây
      description: |
        Core Business lấy danh sách kết quả face-match hoặc detection gần đây
        để audit hoặc hiển thị dashboard. Hỗ trợ cursor-based pagination.
      tags: [vision]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Danh sách kết quả gần đây
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionResultPage"
              examples:
                firstPage:
                  value:
                    items:
                      - matchId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                        traceId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                        decision: MATCH
                        confidence: 0.97
                        subjectId: STUDENT-2026-001
                        reason: null
                        modelVersion: v2.1.0
                        processedAt: "2026-05-10T08:00:00Z"
                    nextCursor: null
                    hasMore: false
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

webhooks:
  detectionCompleted:
    post:
      operationId: onDetectionCompleted
      summary: Webhook khi AI Vision hoàn tất phân tích
      description: AI Vision phát sự kiện khi hoàn tất detection, Core Business nhận để xử lý tiếp.
      tags: [vision]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Detection"
      responses:
        "200":
          description: Consumer đã nhận webhook

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DetectionId:
      name: detectionId
      in: path
      required: true
      description: UUID của kết quả detection.
      schema:
        type: string
        format: uuid

    Cursor:
      name: cursor
      in: query
      required: false
      description: Cursor dùng để lấy trang tiếp theo.
      schema:
        type: [string, "null"]
        minLength: 1
        maxLength: 200

    Limit:
      name: limit
      in: query
      required: false
      description: Số item tối đa mỗi trang.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok]
          description: Trạng thái service.
          example: ok
        service:
          type: string
          minLength: 2
          maxLength: 80
          description: Tên service.
          example: ai-vision
        time:
          type: string
          format: date-time
          description: Thời điểm kiểm tra.
          example: "2026-05-10T08:00:00Z"

    FaceMatchRequest:
      oneOf:
        - $ref: "#/components/schemas/ImageRefRequest"
        - $ref: "#/components/schemas/EmbeddingRequest"
      discriminator:
        propertyName: requestType
        mapping:
          IMAGE_REF: "#/components/schemas/ImageRefRequest"
          EMBEDDING: "#/components/schemas/EmbeddingRequest"

    ImageRefRequest:
      type: object
      additionalProperties: false
      required: [requestType, traceId, imageRef]
      properties:
        requestType:
          type: string
          const: IMAGE_REF
          description: Loại request.
          example: IMAGE_REF
        traceId:
          type: string
          format: uuid
          description: ID để audit và trace request.
        imageRef:
          type: string
          format: uri
          minLength: 10
          maxLength: 500
          description: URL ảnh cần phân tích.
          example: https://storage.campus.local/frames/frame-001.jpg

    EmbeddingRequest:
      type: object
      additionalProperties: false
      required: [requestType, traceId, embedding]
      properties:
        requestType:
          type: string
          const: EMBEDDING
          description: Loại request.
          example: EMBEDDING
        traceId:
          type: string
          format: uuid
          description: ID để audit và trace request.
        embedding:
          type: array
          minItems: 1
          maxItems: 2048
          items:
            type: number
            minimum: -1
            maximum: 1
          description: Vector embedding khuôn mặt.

    FaceMatchResult:
      type: object
      additionalProperties: false
      required:
        [matchId, traceId, decision, confidence, modelVersion, processedAt]
      properties:
        matchId:
          type: string
          format: uuid
          description: UUID kết quả match.
        traceId:
          type: string
          format: uuid
          description: Trace lại request gốc.
        decision:
          type: string
          enum: [MATCH, NO_MATCH, LOW_CONFIDENCE]
          description: Quyết định của AI Vision.
          example: MATCH
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Độ tin cậy từ 0.0 đến 1.0.
          example: 0.97
        subjectId:
          type: [string, "null"]
          minLength: 3
          maxLength: 80
          description: ID đối tượng nhận dạng được, null nếu không match.
          example: STUDENT-2026-001
        reason:
          type: [string, "null"]
          maxLength: 300
          description: Lý do khi decision là LOW_CONFIDENCE hoặc NO_MATCH.
          example: null
        modelVersion:
          type: string
          minLength: 3
          maxLength: 20
          description: Phiên bản model AI dùng để xử lý.
          example: v2.1.0
        processedAt:
          type: string
          format: date-time
          description: Thời điểm AI Vision xử lý xong.
          example: "2026-05-10T08:00:00Z"

    DetectedObject:
      type: object
      additionalProperties: false
      required: [label, confidence]
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 80
          description: Nhãn đối tượng phát hiện.
          example: person
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Độ tin cậy nhận diện đối tượng.
          example: 0.95
        boundingBox:
          type: object
          additionalProperties: false
          required: [x, y, width, height]
          properties:
            x:
              type: integer
              minimum: 0
            y:
              type: integer
              minimum: 0
            width:
              type: integer
              minimum: 1
            height:
              type: integer
              minimum: 1

    Detection:
      type: object
      additionalProperties: false
      required:
        [
          detectionId,
          sourceDeviceId,
          objects,
          overallConfidence,
          modelVersion,
          detectedAt,
        ]
      properties:
        detectionId:
          type: string
          format: uuid
          description: UUID kết quả detection.
        sourceDeviceId:
          type: string
          minLength: 2
          maxLength: 80
          description: ID thiết bị nguồn (camera).
          example: CAMERA-01
        objects:
          type: array
          minItems: 0
          maxItems: 50
          items:
            $ref: "#/components/schemas/DetectedObject"
          description: Danh sách đối tượng phát hiện.
        overallConfidence:
          type: number
          minimum: 0
          maximum: 1
          description: Độ tin cậy tổng thể.
          example: 0.95
        riskLevel:
          type: [string, "null"]
          enum: [LOW, MEDIUM, HIGH, null]
          description: Mức độ rủi ro, null nếu chưa đánh giá.
          example: LOW
        modelVersion:
          type: string
          minLength: 3
          maxLength: 20
          description: Phiên bản model AI.
          example: v2.1.0
        detectedAt:
          type: string
          format: date-time
          description: Thời điểm phát hiện.

    VisionResultPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, hasMore]
      properties:
        items:
          type: array
          minItems: 0
          maxItems: 100
          items:
            $ref: "#/components/schemas/FaceMatchResult"
        nextCursor:
          type: [string, "null"]
          description: Cursor trang tiếp theo, null nếu hết dữ liệu.
          example: null
        hasMore:
          type: boolean
          description: Còn dữ liệu ở trang sau hay không.
          example: false

    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: URI định danh loại lỗi.
          example: https://campus.local/errors/validation
        title:
          type: string
          minLength: 3
          maxLength: 120
          description: Tiêu đề lỗi ngắn gọn.
          example: Dữ liệu không hợp lệ
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP status code.
          example: 400
        detail:
          type: [string, "null"]
          maxLength: 500
          description: Mô tả chi tiết lỗi.
          example: Field imageRef không đúng định dạng URI
        instance:
          type: [string, "null"]
          format: uri
          description: URI của request gây lỗi.
          example: https://campus.local/vision/face-match
        errors:
          type: array
          minItems: 0
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
                minLength: 1
                maxLength: 80
                example: imageRef
              code:
                type: string
                minLength: 2
                maxLength: 80
                example: INVALID_URI
              message:
                type: string
                minLength: 3
                maxLength: 200
                example: imageRef phải là URI hợp lệ

  responses:
    BadRequest:
      description: Dữ liệu sai định dạng
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://campus.local/errors/validation
            title: Dữ liệu không hợp lệ
            status: 400
            detail: Payload không đúng JSON Schema
            instance: https://campus.local/vision/face-match
            errors:
              - field: requestType
                code: ENUM_MISMATCH
                message: requestType phải là IMAGE_REF hoặc EMBEDDING

    Unauthorized:
      description: Thiếu hoặc sai thông tin xác thực
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://campus.local/errors/unauthorized
            title: Chưa xác thực
            status: 401
            detail: Thiếu Bearer token
            instance: https://campus.local/vision/face-match
            errors: []

    Forbidden:
      description: Không có quyền thực hiện thao tác
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    NotFound:
      description: Resource không tồn tại
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    UnprocessableEntity:
      description: Payload đúng định dạng nhưng không hợp lệ về nghiệp vụ
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    InternalServerError:
      description: Lỗi không mong muốn phía server
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
